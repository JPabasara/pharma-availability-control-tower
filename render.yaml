services:
  - type: web
    name: pharma-control-tower-api
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: python -m uvicorn apps.api.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - apps/api/**
        - db/**
        - demo_state/**
        - integrations/**
        - scripts/**
        - storage/**
        - alembic.ini
        - render.yaml
        - requirements.txt
        - verify_routes.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ENGINE_MODE
        value: stub
      - key: BUSINESS_TIMEZONE
        value: Asia/Colombo
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ALLOW_ORIGIN_REGEX
        sync: false


